<!DOCTYPE html>
<html>
<body>
<h1 id="g">loading...</h1>

<script>
  const params = new URLSearchParams(window.location.search);
  const grade = params.get("v") || localStorage.getItem("routeGrade") || "unknown";

  document.getElementById("g").innerText = grade;

  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(grade);
  }
</script>
</body>
</html>
