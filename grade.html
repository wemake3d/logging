<script>
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get("v");
  const fromStorage = localStorage.getItem("routeGrade");
  const grade = fromUrl || fromStorage || "unknown";

  document.body.innerHTML = `
    <h1>Grade Page</h1>
    <p>From URL: ${fromUrl}</p>
    <p>From Storage: ${fromStorage}</p>
    <p>Final Grade: ${grade}</p>
  `;

  setTimeout(() => {
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(grade);
    }
    if (window.parent) {
      window.parent.postMessage(grade, "*");
    }
  }, 500);
</script>
