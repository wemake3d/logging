<!DOCTYPE html>
<html>
<body>

<script>
  const fromStorage = localStorage.getItem("routeGrade");

  document.body.innerHTML = `
    <h1>Grade Page</h1>
    <p>From storage: ${fromStorage}</p>
  `;

  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(fromStorage || "none");
  }
</script>

</body>
</html>
