<!DOCTYPE html>
<html>
<body>
<h1 id="g">loading...</h1>

<script>
  const params = new URLSearchParams(window.location.search);
  const grade = params.get("v") || "none";

  document.getElementById("g").innerText = grade;

  setTimeout(function () {
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(grade);
    }

    if (window.parent) {
      window.parent.postMessage(grade, "*");
    }
  }, 500);
</script>
</body>
</html>
