<script>
  const params = new URLSearchParams(window.location.search);
  const grade = params.get("v") || "unknown";

  localStorage.setItem("routeGrade", grade);

  document.body.innerHTML = `
    <h1>Launcher</h1>
    <p>Grade from URL: ${grade}</p>
    <p>Stored grade: ${localStorage.getItem("routeGrade")}</p>
    <p>Redirecting...</p>
  `;

  setTimeout(() => {
    window.location.href = "https://thunkable.site/w/YOUR_APP_ID";
  }, 2000);
</script>
