<!DOCTYPE html>
<html>
<head>
  <title>Launch</title>
</head>
<body>
  <h1>Launcher loading...</h1>

  <script>
    const params = new URLSearchParams(window.location.search);
    const grade = params.get("v") || "unknown";

    localStorage.setItem("routeGrade", grade);

    document.body.innerHTML = `
      <h1>Launcher</h1>
      <p>Grade from URL: ${grade}</p>
      <p>Stored grade: ${localStorage.getItem("routeGrade")}</p>
      <p>Redirect disabled for testing.</p>
    `;
  </script>
</body>
</html>
