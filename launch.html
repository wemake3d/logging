<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .spinner {
      border: 6px solid #333;
      border-top: 6px solid #4CAF50;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .text {
      font-size: 18px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="spinner"></div>
<div class="text">Opening Route Logger…</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const grade = params.get("v") || "unknown";
  const route = params.get("r") || "unknown";

  const api =
    "https://script.google.com/macros/s/AKfycbxmvsMC3Tzacx00FbyAQLtcG4eUmOxU_23J_9JMYcFWziyQiMrwWlTdwQkXF2DFO5pP/exec?action=set&v="
    + encodeURIComponent(grade)
    + "&r="
    + encodeURIComponent(route);

  fetch(api, { cache: "no-store" })
    .finally(() => {
      window.location.replace("https://thunkable.site/w/fF5gRGy6ut_VukeXF_wRl");
    });
</script>

</body>
</html>
